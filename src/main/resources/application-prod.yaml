spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/expense_prod_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://expense-manager.com,https://www.expense-manager.com}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  email:
    from: ${MAIL_FROM:noreply@expense-manager.com}
    from-name: "Expense Manager"

  cache:
    dashboard:
      ttl-minutes: 5
    statistics:
      ttl-minutes: 10

logging:
  level:
    com.dev.expense_manager: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
