spring:
  application:
    name: expense-manager

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

  jwt:
    secret: ${JWT_SECRET:VWRfdmVyeVN1cGVyU2VjcmV0S2V5X0Zvcl9KVVdUX0NvZGVfMjAyNl8xMjM0NTY3ODkwXzEyMzQ1Njc4OTAxMjM0NTY3ODkw}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  cache:
    dashboard:
      ttl-minutes: 5
    statistics:
      ttl-minutes: 10

  email:
    from: ${MAIL_FROM:your-email@gmail.com}
    from-name: Expense Manager

logging:
  level:
    com.dev.expense_manager: DEBUG
    org.springframework.security: INFO
