server:
  port: 8080

spring:
  application:
    name: expense-manager
  datasource:
    url: jdbc:postgresql://localhost:5432/expense_db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    secret: ExpenseManagerSecretKeyForJWTTokenGeneration2026VeryLongSecretKey123456789
    expiration-ms: 86400000
